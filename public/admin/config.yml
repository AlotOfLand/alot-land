backend:
  name: git-gateway
  branch: main

# Fallback (default) media library — used only if Cloudinary fails to load
media_folder: "public/images"
public_folder: "/images"

# Cloudinary media library: multi-select bulk upload + auto WebP/AVIF + auto
# quality, served from Cloudinary's CDN. cloud_name & api_key are safe to expose;
# the API secret is NOT here and must stay private.
media_library:
  name: cloudinary
  output_filename_only: false
  config:
    cloud_name: doex0egtl
    api_key: "782436327598791"
    default_transformations:
      - - fetch_format: auto
          quality: auto

collections:
  - name: "listings"
    label: "Listings"
    folder: "src/content/listings"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Status", name: "status", widget: "select", options: [{label: "Available", value: "available"}, {label: "Coming Soon", value: "coming-soon"}, {label: "Under Contract", value: "under-contract"}, {label: "Sold", value: "sold"}] }
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }
      - { label: "State", name: "state", widget: "select", options: ["Arizona", "Tennessee"] }
      - { label: "County", name: "county", widget: "string" }
      - { label: "Acreage", name: "acreage", widget: "string" }
      - { label: "Price", name: "price", widget: "string", required: false, hint: "e.g. $45,000 or leave blank for 'Contact for Price'" }
      - { label: "Zoning", name: "zoning", widget: "string", required: false }
      - { label: "Road Access", name: "roadAccess", widget: "string", required: false }
      - { label: "Water", name: "water", widget: "string", required: false }
      - { label: "Power/Utilities", name: "power", widget: "string", required: false }
      - { label: "GPS Coordinates", name: "gps", widget: "string", required: false, hint: "Paste both coordinates from Google Maps as lat,lng — e.g. 35.6734,-86.7715. This places the map pin automatically." }
      - { label: "Video URL (YouTube or Vimeo)", name: "videoUrl", widget: "string", required: false }
      - { label: "Show Video on Listing Page", name: "showVideo", widget: "boolean", default: true, required: false, hint: "Toggle off to hide the video without deleting the URL" }
      - { label: "Zillow Listing URL", name: "zillowUrl", widget: "string", required: false, hint: "Paste the full Zillow listing URL — e.g. https://www.zillow.com/homedetails/..." }
      - { label: "Show Zillow Link on Listing Page", name: "showZillow", widget: "boolean", default: false, required: false, hint: "Toggle on to show a 'View on Zillow' button on the listing page" }
      - { label: "Show Seller-Finance Calculator", name: "showSellerFinance", widget: "boolean", default: false, required: false, hint: "Toggle on to show the seller-finance payment calculator on this listing (pre-filled with this lot's price)" }
      - { label: "Photos", name: "photos", widget: "list", field: { label: "Photo", name: "photo", widget: "image" } }
      - { label: "Description", name: "body", widget: "markdown" }
      - { label: "Date Listed", name: "date", widget: "datetime" }
      - { label: "Date Sold", name: "dateSold", widget: "datetime", required: false, hint: "Fill in when the property closes" }
      - { label: "Show Days on Market", name: "showDaysOnMarket", widget: "boolean", default: false, required: false, hint: "When both Date Listed and Date Sold are filled in, this displays the calculated days on market on the listing page" }
      - { label: "Buyer Testimonial", name: "buyerTestimonial", widget: "text", required: false, hint: "Add when sold — appears as a quote on the listing page" }
      - { label: "Buyer Name", name: "buyerName", widget: "string", required: false, hint: "e.g. John D. or Allan R. Koepsell" }
      - { label: "Community (optional)", name: "community", widget: "relation", collection: "communities", search_fields: ["title"], value_field: "{{slug}}", display_fields: ["title"], required: false, hint: "Link this listing to a community subdivision if applicable" }
      - label: "Nearby Amenities Photos"
        name: "amenityPhotos"
        widget: "list"
        required: false
        hint: "Add photos of nearby restaurants, parks, downtown areas, and activities. These appear in a 'What's Nearby' slideshow on the listing page."
        fields:
          - { label: "Photo", name: "image", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", hint: "e.g. Cane Creek Park — great for kayaking and hiking on weekends" }
          - { label: "Category", name: "category", widget: "select", required: false, options: ["Downtown", "Food & Drink", "Outdoors", "Recreation", "Shopping", "Schools", "Healthcare"] }

  - name: "testimonials"
    label: "Testimonials"
    folder: "src/content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string", hint: "e.g. Allan R. Koepsell" }
      - { label: "Location", name: "location", widget: "string", required: false, hint: "e.g. Knoxville, TN" }
      - { label: "Role / Title", name: "role", widget: "string", required: false, hint: "e.g. Former Real Estate Broker, Land Investor" }
      - { label: "Show on Site", name: "featured", widget: "boolean", default: true }
      - { label: "Display Order", name: "order", widget: "number", default: 99, hint: "Lower number = shows first" }
      - { label: "Testimonial", name: "body", widget: "text", hint: "Write the full testimonial quote here — no quotation marks needed, they are added automatically" }
      - { label: "Date", name: "date", widget: "datetime" }

  - name: "communities"
    label: "Communities"
    folder: "src/content/communities"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Community Name", name: "title", widget: "string", hint: "e.g. Desert Ridge Estates" }
      - { label: "Location", name: "location", widget: "string", required: false, hint: "e.g. Yavapai County, AZ" }
      - { label: "State", name: "state", widget: "select", required: false, options: [{label: "Arizona", value: "Arizona"}, {label: "Tennessee", value: "Tennessee"}], hint: "Used to match preferred vendors for this community" }
      - { label: "Status", name: "status", widget: "select", options: [{label: "Coming Soon", value: "coming-soon"}, {label: "Lots Available", value: "lots-available"}, {label: "Sold Out", value: "sold-out"}] }
      - { label: "Community Image", name: "image", widget: "image", required: false }
      - { label: "Video URL (YouTube or Vimeo)", name: "videoUrl", widget: "string", required: false, hint: "Paste a YouTube or Vimeo link to embed a community overview video" }
      - { label: "Show Video on Community Page", name: "showVideo", widget: "boolean", default: true, required: false, hint: "Toggle off to hide the video without deleting the URL" }
      - { label: "Description", name: "body", widget: "markdown" }
      - label: "Nearby Amenities Photos"
        name: "amenityPhotos"
        widget: "list"
        required: false
        hint: "Add photos of nearby restaurants, parks, downtown areas, and activities. These appear in a 'What's Nearby' slideshow on the community page."
        fields:
          - { label: "Photo", name: "image", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", hint: "e.g. The Square in downtown Cookeville — farmers markets every Saturday" }
          - { label: "Category", name: "category", widget: "select", required: false, options: ["Downtown", "Food & Drink", "Outdoors", "Recreation", "Shopping", "Schools", "Healthcare"] }
      - { label: "Date", name: "date", widget: "datetime" }

  - name: "press"
    label: "Press & Coverage"
    folder: "src/content/press"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Headline", name: "title", widget: "string" }
      - { label: "Publication / Source", name: "publication", widget: "string", required: false, hint: "e.g. Forbes, Arizona Republic, Land Investor Weekly" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt / Summary", name: "excerpt", widget: "text", required: false }
      - { label: "External Article URL", name: "externalUrl", widget: "string", required: false, hint: "Link to the article online" }
      - { label: "PDF Upload", name: "pdf", widget: "file", required: false, hint: "Upload a PDF of the article if no live URL" }
      - { label: "Feature on Media page", name: "featured", widget: "boolean", default: false }
      - { label: "Body (optional)", name: "body", widget: "markdown", required: false }

  - name: "podcasts"
    label: "Podcast Appearances"
    folder: "src/content/podcasts"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Podcast / Show Name", name: "showName", widget: "string", hint: "e.g. The Land Investing Show" }
      - { label: "Episode Title", name: "episodeTitle", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Show Cover Image", name: "coverImage", widget: "image", required: false }
      - { label: "Listen / Watch URL", name: "listenUrl", widget: "string", hint: "Link to Spotify, Apple Podcasts, YouTube, etc." }
      - { label: "Feature on Media page", name: "featured", widget: "boolean", default: false }
      - { label: "Notes (optional)", name: "body", widget: "markdown", required: false }

  - name: "books"
    label: "Books"
    folder: "src/content/books"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Book Title", name: "title", widget: "string" }
      - { label: "Cover Image", name: "coverImage", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Amazon Paperback URL", name: "amazonPaperbackUrl", widget: "string", required: false }
      - { label: "Amazon Kindle URL", name: "amazonKindleUrl", widget: "string", required: false }
      - { label: "Published Date", name: "publishedDate", widget: "datetime", required: false }
      - { label: "Feature on Media page", name: "featured", widget: "boolean", default: true }
      - { label: "About the Book (optional)", name: "body", widget: "markdown", required: false }

  - name: "ebooks"
    label: "Free Ebooks"
    folder: "src/content/ebooks"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Ebook Title", name: "title", widget: "string" }
      - { label: "Cover Image", name: "coverImage", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Audience", name: "audience", widget: "select", options: [{label: "Land Buyers", value: "buyers"}, {label: "Capital Investors", value: "investors"}, {label: "Land Sellers", value: "sellers"}, {label: "Both / General", value: "both"}] }
      - { label: "Show on Media Page", name: "featured", widget: "boolean", default: true, hint: "Toggle ON to show this ebook on the /media page. The form embed is auto-loaded based on the Audience selection above." }
      - { label: "Long Description (optional)", name: "body", widget: "markdown", required: false }

  - name: "faqs"
    label: "FAQs"
    folder: "src/content/faqs"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Question", name: "question", widget: "string", hint: "The question as it appears in the accordion" }
      - { label: "Category", name: "category", widget: "select", options: [{label: "Buying Land (from us)", value: "buying"}, {label: "Selling Land (to us)", value: "selling"}, {label: "General", value: "general"}] }
      - { label: "Display Order", name: "order", widget: "number", default: 99, hint: "Lower number = shows first. Buying and Selling are sorted separately." }
      - { label: "Show on Site", name: "active", widget: "boolean", default: true, hint: "Toggle off to hide this FAQ without deleting it" }
      - { label: "Answer", name: "body", widget: "markdown", hint: "Full answer — supports bold, lists, and links" }

  - name: "team"
    label: "Team Members"
    folder: "src/content/team"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Full Name", name: "name", widget: "string" }
      - { label: "Role / Title", name: "role", widget: "string", hint: "e.g. Founder & CEO, Operations, Transaction Coordinator" }
      - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Headshot or professional photo" }
      - { label: "Display Order", name: "order", widget: "number", default: 99, hint: "Lower number = shows first" }
      - { label: "Show on Team Page", name: "active", widget: "boolean", default: true }
      - { label: "Bio", name: "body", widget: "markdown", hint: "2–4 sentences about this person's background and role" }

  - name: "vendors"
    label: "Preferred Vendors"
    folder: "src/content/vendors"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Business Name", name: "name", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: [{label: "Excavation & Septic", value: "excavation-septic"}, {label: "Preferred Builders", value: "builders"}, {label: "Preferred Lenders", value: "lenders"}] }
      - { label: "State", name: "state", widget: "select", options: [{label: "Arizona", value: "Arizona"}, {label: "Tennessee", value: "Tennessee"}, {label: "Both (AZ + TN)", value: "Both"}] }
      - { label: "Logo", name: "logo", widget: "image", required: false }
      - { label: "Service Area", name: "serviceArea", widget: "string", required: false, hint: "e.g. Yavapai County, AZ or Statewide TN" }
      - { label: "Phone", name: "phone", widget: "string", required: false, hint: "e.g. (615) 555-1234" }
      - { label: "Website URL", name: "website", widget: "string", required: false, hint: "e.g. https://theirsite.com" }
      - { label: "Show on Site", name: "active", widget: "boolean", default: true }
      - { label: "Display Order", name: "order", widget: "number", default: 99, hint: "Lower number = shows first" }
      - { label: "Description", name: "body", widget: "markdown", hint: "1–2 sentences about why you recommend them" }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Contact Info"
        name: "contact"
        file: "src/content/settings/contact.json"
        fields:
          - { label: "Phone Number (display)", name: "phone", widget: "string" }
          - { label: "Phone Number (digits only)", name: "phoneRaw", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
      - label: "Homepage Settings"
        name: "homepage"
        file: "src/content/settings/homepage.json"
        fields:
          - { label: "YouTube Video ID", name: "homepageVideoId", widget: "string", required: false, hint: "The ID from your YouTube URL e.g. lR3ZteyGK14 from youtube.com/watch?v=lR3ZteyGK14" }
          - { label: "Hero Tagline", name: "heroTagline", widget: "string", required: false, hint: "e.g. Off-market deals in Arizona, Tennessee & Arkansas." }
      - label: "Sugar Tree Vista"
        name: "sugar-tree"
        file: "src/content/settings/sugar-tree.json"
        fields:
          - { label: "One-Day Sale Date", name: "saleDate", widget: "datetime", hint: "The countdown on the Sugar Tree Vista page counts down to this date/time." }
          - { label: "Hero Video URL (YouTube or Vimeo)", name: "heroVideoUrl", widget: "string", required: false, hint: "Paste a link to embed the walkthrough video in the hero. Leave blank to hide it." }
