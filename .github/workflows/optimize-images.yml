name: Optimize images

# Whenever images land on main (e.g. uploaded via the Decap CMS), shrink any
# oversized ones in place and commit the smaller versions back, so the repo and
# the live site both stay lean with zero manual steps.

on:
  push:
    branches: [main]
    paths:
      - 'public/images/**'

permissions:
  contents: write

# Cancel an in-flight run if another push arrives
concurrency:
  group: optimize-images
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    # The commit this job pushes back also touches public/images/**, which would
    # re-trigger this workflow. Skipping when the actor is the Actions bot stops
    # that cleanly (and a re-run would find nothing to do anyway).
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Optimize images
        run: node scripts/optimize-images.mjs

      - name: Commit optimized images
        run: |
          if [ -n "$(git status --porcelain public/images)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/images
            git commit -m "chore: auto-optimize uploaded images"
            git push
          else
            echo "No images needed optimizing."
          fi
