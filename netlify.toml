[build]
  command = "node scripts/optimize-images.mjs && npm run build"
  publish = "dist"

[[redirects]]
  from = "/invest"
  to = "https://alot.capital"
  status = 301
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=()"
    # CSP enforced. Verified clean on the live site (homepage chat/GA/fonts, with
    # GHL msgsndr + leadconnectorhq, Cloudinary, YouTube/Vimeo, Leaflet/OSM all
    # allowed). If a new third-party ever breaks, temporarily append
    # `-Report-Only` to this header name to debug, then re-tighten.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://widgets.leadconnectorhq.com https://*.leadconnectorhq.com https://*.msgsndr.com https://brand.alot.land https://unpkg.com https://identity.netlify.com https://*.cloudinary.com; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; frame-src 'self' https://brand.alot.land https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com https://*.leadconnectorhq.com https://*.msgsndr.com https://*.cloudinary.com; connect-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://brand.alot.land https://*.leadconnectorhq.com wss://*.leadconnectorhq.com https://*.msgsndr.com wss://*.msgsndr.com https://api.cloudinary.com https://*.tile.openstreetmap.org https://unpkg.com https://identity.netlify.com; child-src 'self' blob: https://*.cloudinary.com; worker-src 'self' blob:; base-uri 'self'; form-action 'self' https://*.leadconnectorhq.com https://brand.alot.land"

# /admin runs Decap CMS, which needs 'unsafe-eval' (and Netlify Identity, GitHub
# git-gateway, Cloudinary media library). This auth-gated path gets its own looser
# CSP — more specific than /* so it overrides — while the public site stays strict.
[[headers]]
  for = "/admin/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://identity.netlify.com https://*.cloudinary.com; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https://api.github.com https://identity.netlify.com https://api.netlify.com https://*.cloudinary.com https://api.cloudinary.com; frame-src 'self' https://*.cloudinary.com; child-src 'self' blob: https://*.cloudinary.com; worker-src 'self' blob:; base-uri 'self'"
