[build]
  command = "node scripts/optimize-images.mjs && npm run build"
  publish = "dist"

[[redirects]]
  from = "/invest"
  to = "https://alot.capital"
  status = 301
  force = true

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=()"
    # CSP is in REPORT-ONLY mode: it never blocks anything, only logs violations
    # to the browser console. Once verified clean on the live site (forms, chat,
    # map, /admin all working with no CSP errors), switch this header name to
    # `Content-Security-Policy` to enforce it.
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://widgets.leadconnectorhq.com https://*.leadconnectorhq.com https://brand.alot.land https://unpkg.com https://identity.netlify.com https://*.cloudinary.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; frame-src 'self' https://brand.alot.land https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com https://*.leadconnectorhq.com https://*.cloudinary.com; connect-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://brand.alot.land https://*.leadconnectorhq.com wss://*.leadconnectorhq.com https://api.cloudinary.com https://*.tile.openstreetmap.org https://unpkg.com https://identity.netlify.com; child-src 'self' blob: https://*.cloudinary.com; worker-src 'self' blob:; base-uri 'self'; form-action 'self' https://*.leadconnectorhq.com https://brand.alot.land"
